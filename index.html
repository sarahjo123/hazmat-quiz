<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위험물 퀴즈</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:18px;
    cursor:pointer;
}

#quiz{
    display:none;
}

.choice{
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔥 위험물산업기사 퀴즈 🔥</h1>

<div id="menu">

<h2>문제 유형</h2>

<button onclick="startQuiz()">제1류 퀴즈</button>

</div>

<div id="quiz">

<h2 id="question"></h2>

<div id="choices"></div>

<br>

<button onclick="nextQuestion()">다음 문제</button>

</div>

</div>

<script>

const questions=[

{
question:"염소산칼륨은 몇 류인가?",
choices:[
"제1류",
"제2류",
"제3류",
"제4류"
],
answer:0
},

{
question:"황린은 몇 류인가?",
choices:[
"제2류",
"제3류",
"제4류",
"제5류"
],
answer:1
},

{
question:"적린은 몇 류인가?",
choices:[
"제2류",
"제3류",
"제4류",
"제5류"
],
answer:0
}

];

let current=0;

function startQuiz(){

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

showQuestion();

}

function showQuestion(){

const q=questions[current];

document.getElementById("question").innerHTML=
"문제 "+(current+1)+"<br><br>"+q.question;

let html="";

q.choices.forEach((choice,index)=>{

html+=`<button class="choice"
onclick="check(${index})">${choice}</button>`;

});

document.getElementById("choices").innerHTML=html;

}

function check(num){

if(num===questions[current].answer){

alert("정답!");

}else{

alert("오답!");

}

}

function nextQuestion(){

current++;

if(current>=questions.length){

alert("끝!");

location.reload();

return;

}

showQuestion();

}

</script>

</body>
</html>
